name: Auto Label
on:
  pull_request:
    branches:
      - master
jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: auto label
        uses: RocketSurgeonsGuild/actions/auto-label@v0.3.15
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
