name: Auto Label
on:
  pull_request:
    branches:
      - master
jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: auto label
        uses: RocketSurgeonsGuild/actions/auto-label@v0.3.19
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
