name: Auto Label
on:
  pull_request:
    branches:
      - master
jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: auto label
        uses: RocketSurgeonsGuild/actions/auto-label@v0.3.19
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
