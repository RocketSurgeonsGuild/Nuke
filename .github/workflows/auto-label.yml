name: Auto Label
on:
  pull_request:
    branches:
      - master
jobs:
  auto_label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: auto label
        uses: RocketSurgeonsGuild/actions/auto-label@v0.3.15
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
